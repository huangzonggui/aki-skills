<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --guide-bg: #f7f2ee;
            --guide-card: #fffaf8;
            --guide-surface: #ffffff;
            --guide-border: #ead8d4;
            --guide-muted: #a88c87;
            --guide-text: #4a332f;
            --guide-strong: #1b1514;
            --guide-accent: #d93630;
            --guide-accent-dark: #b62c27;
            --guide-highlight: #f7dfaa;
            --guide-code: #f7eeeb;
            --guide-shadow: 0 28px 80px rgba(100, 44, 35, 0.10);
            --panel-bg: rgba(68, 27, 23, 0.94);
            --panel-soft: rgba(116, 50, 43, 0.72);
            --content-padding-x: 44px;
            --content-padding-y: 56px;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--guide-bg);
            min-height: 100vh;
            color: var(--guide-text);
        }

        .control-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            padding: 20px;
            color: white;
            box-shadow: 0 25px 50px rgba(15, 23, 42, 0.35);
            z-index: 100;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }

        .control-panel h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            color: #f8fafc;
        }

        .control-panel label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .segmented-control {
            display: flex;
            background: var(--panel-soft);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 14px;
        }

        .segmented-control button {
            flex: 1;
            background: transparent;
            border: none;
            color: #94a3b8;
            padding: 8px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .segmented-control button.active {
            background: var(--guide-accent);
            color: white;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--guide-accent) 0%, var(--guide-accent-dark) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(217, 54, 48, 0.28);
        }

        .btn-secondary {
            background: var(--panel-soft);
            color: #e2e8f0;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.92);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .stats {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid rgba(255, 229, 220, 0.18);
            font-size: 11px;
            color: #c8b6b0;
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stats-label {
            color: #d7c5bf;
        }

        .stats-value {
            color: #fff0eb;
            font-weight: 600;
        }

        .progress-toast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(68, 27, 23, 0.94);
            color: white;
            padding: 14px 28px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            z-index: 1000;
            display: none;
            box-shadow: 0 10px 30px rgba(68, 27, 23, 0.22);
        }

        .progress-toast.show {
            display: block;
            animation: slideDown 0.25s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-14px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .preview-container {
            display: flex;
            justify-content: center;
            padding: 20px;
            margin-left: 340px;
        }

        .article-card {
            width: {{TARGET_WIDTH}}px;
            background: var(--guide-card);
            border-radius: 28px;
            box-shadow: var(--guide-shadow);
            border: 1px solid rgba(217, 221, 227, 0.55);
            overflow: hidden;
        }

        .content-area {
            padding: var(--content-padding-y) var(--content-padding-x) 68px;
            background: var(--guide-card);
        }

        .article-title {
            font-size: 38px;
            font-weight: 800;
            line-height: 1.32;
            letter-spacing: -0.03em;
            color: var(--guide-strong);
            margin-bottom: 34px;
        }

        h2.section-title {
            display: grid;
            grid-template-columns: 96px minmax(0, 1fr);
            column-gap: 20px;
            align-items: flex-start;
            margin: 72px 0 34px;
        }

        h2.section-title .section-side {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-height: 84px;
            padding-right: 18px;
        }

        h2.section-title .section-side::after {
            content: '';
            position: absolute;
            top: 6px;
            right: 0;
            width: 1px;
            height: 74px;
            background: #e8d5d0;
        }

        h2.section-title .section-number {
            font-size: 58px;
            line-height: 0.9;
            font-weight: 800;
            letter-spacing: -0.07em;
            color: var(--guide-accent);
        }

        h2.section-title .section-part {
            margin-top: 10px;
            font-size: 12px;
            letter-spacing: 0.28em;
            color: #d1b5af;
            font-weight: 700;
        }

        h2.section-title .section-copy {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 3px;
        }

        h2.section-title .section-main {
            font-size: 28px;
            line-height: 1.34;
            font-weight: 800;
            color: var(--guide-strong);
        }

        h2.section-title .section-kicker {
            font-size: 12px;
            line-height: 1.5;
            letter-spacing: 0.22em;
            color: var(--guide-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        h3,
        h3.subsection-title {
            position: relative;
            padding-left: 20px;
            margin: 46px 0 24px;
            font-size: 24px;
            line-height: 1.45;
            font-weight: 800;
            color: var(--guide-strong);
        }

        h3::before,
        h3.subsection-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.38em;
            width: 5px;
            height: 1.2em;
            border-radius: 999px;
            background: var(--guide-accent);
        }

        p {
            font-size: 20px;
            line-height: 1.95;
            color: var(--guide-text);
            margin-top: 0;
            margin-bottom: 30px;
            text-align: left;
            word-break: break-word;
        }

        br {
            display: block;
            content: '';
            margin-top: 10px;
        }

        pre + br,
        p.step-row + br {
            display: none;
        }

        strong {
            color: var(--guide-strong);
            font-weight: 800;
        }

        em {
            color: var(--guide-accent);
            font-style: normal;
            font-weight: 700;
        }

        mark {
            background: linear-gradient(180deg, transparent 0%, transparent 14%, var(--guide-highlight) 14%, var(--guide-highlight) 86%, transparent 86%, transparent 100%);
            color: var(--guide-strong);
            padding: 0 8px;
            border-radius: 6px;
            font-weight: 800;
            box-decoration-break: clone;
            -webkit-box-decoration-break: clone;
        }

        code {
            display: inline-block;
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            font-size: 0.9em;
            font-weight: 800;
            color: #1f2937;
            background: var(--guide-code);
            border-radius: 10px;
            padding: 4px 12px;
            line-height: 1.2;
        }

        pre {
            position: relative;
            margin: 18px 0 32px;
            border-radius: 22px;
            border: 1px solid #ecd8d3;
            background: var(--guide-surface);
            padding: 78px 28px 28px;
            overflow-x: auto;
            box-shadow: 0 8px 26px rgba(136, 61, 49, 0.06);
        }

        pre::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 28px;
            width: 16px;
            height: 16px;
            border-radius: 999px;
            background: #e26b5f;
            box-shadow: 28px 0 0 #e9b86f, 56px 0 0 #d93630;
        }

        pre::after {
            content: '';
            position: absolute;
            top: 52px;
            left: 0;
            right: 0;
            height: 1px;
            background: #f1dfda;
        }

        pre code {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 19px;
            font-weight: 500;
            line-height: 1.75;
            color: #1f2937;
            background: transparent;
            border-radius: 0;
            padding: 0;
            white-space: pre-wrap;
        }

        ul, ol {
            margin: 10px 0 32px;
            padding-left: 30px;
        }

        li {
            font-size: 20px;
            line-height: 1.9;
            color: var(--guide-text);
            margin-bottom: 16px;
        }

        ul li::marker {
            color: var(--guide-accent);
            font-size: 1.15em;
        }

        ol li::marker {
            color: var(--guide-accent);
            font-weight: 800;
        }

        blockquote {
            margin: 24px 0 34px;
            padding: 22px 24px 22px 26px;
            border-left: 6px solid var(--guide-accent);
            border-radius: 18px;
            background: rgba(217, 54, 48, 0.05);
            color: #5e433e;
            font-size: 20px;
            line-height: 1.85;
        }

        hr {
            border: none;
            border-top: 1px dashed #d7dce3;
            margin: 30px 0 34px;
        }

        a {
            color: var(--guide-accent-dark);
            text-decoration: none;
            box-shadow: inset 0 -2px 0 rgba(217, 54, 48, 0.18);
        }

        img {
            width: 100%;
            display: block;
            border-radius: 22px;
            border: 1px solid rgba(217, 221, 227, 0.8);
            margin: 18px 0 30px;
            background: #ffffff;
        }

        p.step-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 21px;
            font-weight: 800;
            line-height: 1.5;
            color: var(--guide-strong);
        }

        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            min-width: 112px;
            border-radius: 10px;
            background: var(--guide-accent);
            color: #ffffff;
            font-size: 18px;
            font-weight: 800;
            line-height: 1;
        }

        .step-text {
            flex: 1;
            color: var(--guide-strong);
        }

        .page-number {
            text-align: center;
            color: #9aa3af;
            font-size: 13px;
            font-weight: 600;
            padding-top: 24px;
        }

        .export-render-root {
            position: fixed;
            top: 0;
            left: 0;
            width: {{TARGET_WIDTH}}px;
            z-index: 9999;
            pointer-events: none;
        }

        .export-slice {
            position: relative;
            width: {{TARGET_WIDTH}}px;
            height: {{TARGET_HEIGHT}}px;
            overflow: hidden;
            background: var(--guide-card);
        }

        .export-slice .content-area {
            position: relative;
            width: {{TARGET_WIDTH}}px;
            height: {{TARGET_HEIGHT}}px;
            padding: var(--content-padding-y) var(--content-padding-x) 96px;
            overflow: hidden;
            background: var(--guide-card);
        }

        .export-slice .content-area > :not(.export-highlight-bg) {
            position: relative;
            z-index: 1;
        }

        .export-slice .page-number {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 28px;
            padding-top: 0;
        }

        .export-slice mark {
            background: transparent !important;
            background-image: none !important;
            padding: 0 !important;
            border-radius: 0 !important;
            color: var(--guide-strong) !important;
            font-weight: 800 !important;
            line-height: inherit !important;
            box-shadow: none !important;
            box-decoration-break: slice !important;
            -webkit-box-decoration-break: slice !important;
        }

        .export-highlight-bg {
            position: absolute;
            background: var(--guide-highlight);
            border-radius: 4px;
            pointer-events: none;
            z-index: 0;
        }

        #staging {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: {{TARGET_WIDTH}}px;
            visibility: hidden;
        }

        #stagingContent {
            width: {{TARGET_WIDTH}}px;
            padding: var(--content-padding-y) var(--content-padding-x) 68px;
            background: var(--guide-card);
        }

        @media (max-width: 1100px) {
            .control-panel {
                position: static;
                width: auto;
                margin: 20px;
                max-height: none;
            }

            .preview-container {
                margin-left: 0;
                padding-top: 0;
            }
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <h3>教程风格导出</h3>

        <label>导出比例</label>
        <div class="segmented-control">
            <button class="ratio-btn active" data-ratio="3:4">3:4</button>
            <button class="ratio-btn" data-ratio="3:5">3:5</button>
        </div>

        <button class="btn btn-primary" id="exportBtn">导出 PNG 图片</button>
        <button class="btn btn-secondary" id="downloadHtmlBtn">下载 HTML 源码</button>

        <div class="stats">
            <div class="stats-row">
                <span class="stats-label">预计生成图片:</span>
                <span class="stats-value" id="sliceCount">-</span>
            </div>
            <div class="stats-row">
                <span class="stats-label">输出尺寸:</span>
                <span class="stats-value" id="outputSize">{{TARGET_WIDTH}} × {{TARGET_HEIGHT}}</span>
            </div>
        </div>
    </div>

    <div class="progress-toast" id="progressToast">正在生成图片...</div>

    <div id="staging">
        <div id="stagingContent"></div>
    </div>

    <div class="preview-container">
        <div class="article-card" id="articleCard">
            <div class="content-area" id="contentArea">
                <h1 class="article-title">{{TITLE}}</h1>
                {{CONTENT}}
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            targetWidth: {{TARGET_WIDTH}},
            ratio: '{{RATIO}}',
            scale: 2
        };

        const contentArea = document.getElementById('contentArea');
        const stagingContent = document.getElementById('stagingContent');
        const exportBtn = document.getElementById('exportBtn');
        const downloadHtmlBtn = document.getElementById('downloadHtmlBtn');
        const progressToast = document.getElementById('progressToast');
        const sliceCountEl = document.getElementById('sliceCount');
        const outputSizeEl = document.getElementById('outputSize');
        const ratioBtns = document.querySelectorAll('.ratio-btn');

        let currentRatio = CONFIG.ratio;

        function getTargetHeight(ratio) {
            return ratio === '3:5' ? 1000 : 800;
        }

        function updateStats() {
            const targetHeight = getTargetHeight(currentRatio);
            const chunks = calculateChunks(targetHeight);
            sliceCountEl.textContent = `${chunks.length} 张`;
            outputSizeEl.textContent = `${CONFIG.targetWidth} × ${targetHeight}`;
        }

        function showToast(message, duration = 0) {
            progressToast.textContent = message;
            progressToast.classList.add('show');

            if (duration > 0) {
                setTimeout(() => {
                    progressToast.classList.remove('show');
                }, duration);
            }
        }

        function splitListElement(listEl) {
            const tagName = listEl.tagName.toLowerCase();
            return Array.from(listEl.children).map(item => {
                const list = document.createElement(tagName);
                list.appendChild(item.cloneNode(true));
                return list;
            });
        }

        function expandExportBlock(el) {
            if (el.matches('ul, ol')) {
                return splitListElement(el);
            }
            return [el];
        }

        function getExportUnits() {
            const rawBlocks = Array.from(contentArea.children)
                .filter(el => el.tagName !== 'BR');

            const units = [];
            for (let i = 0; i < rawBlocks.length; i++) {
                const current = rawBlocks[i];
                if (current.matches('h2.section-title') && rawBlocks[i + 1]) {
                    const nextBlocks = expandExportBlock(rawBlocks[i + 1]);
                    units.push([current].concat(nextBlocks.slice(0, 1)));
                    for (const nextBlock of nextBlocks.slice(1)) {
                        units.push([nextBlock]);
                    }
                    i += 1;
                } else {
                    for (const block of expandExportBlock(current)) {
                        units.push([block]);
                    }
                }
            }

            return units;
        }

        function createExportSlice(units, targetHeight, pageIndex = 1, totalPages = 1) {
            const wrapper = document.createElement('div');
            wrapper.className = 'export-slice';
            wrapper.style.height = `${targetHeight}px`;

            const content = document.createElement('div');
            content.className = 'content-area';
            content.style.height = `${targetHeight}px`;

            for (const unit of units) {
                for (const el of unit) {
                    content.appendChild(el.cloneNode(true));
                }
            }

            const pageNum = document.createElement('div');
            pageNum.className = 'page-number';
            pageNum.textContent = `${pageIndex}/${totalPages}`;

            wrapper.appendChild(content);
            wrapper.appendChild(pageNum);

            return wrapper;
        }

        function waitForImages(root) {
            const images = Array.from(root.querySelectorAll('img'));
            return Promise.all(images.map(img => {
                if (img.complete && img.naturalWidth > 0) {
                    return Promise.resolve();
                }
                return new Promise(resolve => {
                    img.onload = resolve;
                    img.onerror = resolve;
                });
            }));
        }

        function decorateMarkBackgroundsForExport(wrapper) {
            const content = wrapper.querySelector('.content-area');
            if (!content) return;

            content.querySelectorAll('.export-highlight-bg').forEach(bg => bg.remove());

            const contentRect = content.getBoundingClientRect();
            const marks = Array.from(content.querySelectorAll('mark'));

            for (const mark of marks) {
                const rects = Array.from(mark.getClientRects())
                    .filter(rect => rect.width > 1 && rect.height > 1);

                for (const rect of rects) {
                    const bg = document.createElement('span');
                    bg.className = 'export-highlight-bg';
                    bg.style.left = `${rect.left - contentRect.left - 3}px`;
                    bg.style.top = `${rect.top - contentRect.top + rect.height * 0.17}px`;
                    bg.style.width = `${rect.width + 6}px`;
                    bg.style.height = `${rect.height * 0.72}px`;
                    content.insertBefore(bg, content.firstChild);
                }
            }
        }

        function calculateChunks(targetHeight) {
            const units = getExportUnits();
            const chunks = [];
            let currentChunk = [];
            const measuringRoot = document.createElement('div');
            measuringRoot.className = 'export-render-root';
            measuringRoot.style.visibility = 'hidden';
            document.body.appendChild(measuringRoot);

            const fits = (candidate) => {
                measuringRoot.innerHTML = '';
                const testSlice = createExportSlice(candidate, targetHeight);
                measuringRoot.appendChild(testSlice);
                const content = testSlice.querySelector('.content-area');
                return content.scrollHeight <= content.clientHeight;
            };

            for (const unit of units) {
                const candidate = currentChunk.concat([unit]);
                if (currentChunk.length > 0 && !fits(candidate)) {
                    chunks.push(currentChunk);
                    currentChunk = [unit];
                } else {
                    currentChunk = candidate;
                }
            }

            if (currentChunk.length > 0) {
                chunks.push(currentChunk);
            }

            document.body.removeChild(measuringRoot);
            return chunks;
        }

        function canvasLooksBlank(canvas) {
            const ctx = canvas.getContext('2d');
            if (!ctx) return true;

            let min = 255;
            let max = 0;
            const colors = new Set();
            const sampleSize = 32;
            const points = [
                [0.08, 0.08], [0.50, 0.08], [0.92, 0.08],
                [0.08, 0.35], [0.50, 0.35], [0.92, 0.35],
                [0.08, 0.62], [0.50, 0.62], [0.92, 0.62],
                [0.08, 0.88], [0.50, 0.88], [0.92, 0.88],
            ];

            for (const [px, py] of points) {
                const x = Math.max(0, Math.min(canvas.width - sampleSize, Math.round(canvas.width * px - sampleSize / 2)));
                const y = Math.max(0, Math.min(canvas.height - sampleSize, Math.round(canvas.height * py - sampleSize / 2)));
                const data = ctx.getImageData(x, y, sampleSize, sampleSize).data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];
                    const avg = Math.round((r + g + b) / 3);
                    min = Math.min(min, avg);
                    max = Math.max(max, avg);
                    if (colors.size < 48) {
                        colors.add(`${r >> 4},${g >> 4},${b >> 4}`);
                    }
                }
            }

            return max - min < 6 || colors.size < 4;
        }

        async function exportSlices() {
            const targetHeight = getTargetHeight(currentRatio);

            exportBtn.disabled = true;
            showToast('正在生成图片...');

            try {
                await document.fonts.ready;

                const chunks = calculateChunks(targetHeight);
                const totalSlices = chunks.length;

                showToast(`正在生成: 0/${totalSlices}`);

                const renderContainer = document.createElement('div');
                renderContainer.className = 'export-render-root';
                document.body.appendChild(renderContainer);

                for (let i = 0; i < chunks.length; i++) {
                    const chunk = chunks[i];
                    const wrapper = createExportSlice(chunk, targetHeight, i + 1, totalSlices);

                    renderContainer.innerHTML = '';
                    renderContainer.appendChild(wrapper);
                    await waitForImages(wrapper);
                    await new Promise(resolve => requestAnimationFrame(resolve));
                    decorateMarkBackgroundsForExport(wrapper);
                    await new Promise(resolve => requestAnimationFrame(resolve));

                    const canvas = await html2canvas(wrapper, {
                        width: CONFIG.targetWidth,
                        height: targetHeight,
                        scale: CONFIG.scale,
                        useCORS: true,
                        backgroundColor: '#fffaf8',
                        logging: false,
                        allowTaint: false,
                        foreignObjectRendering: false,
                        windowWidth: CONFIG.targetWidth,
                        windowHeight: targetHeight,
                        scrollX: 0,
                        scrollY: 0,
                        imageTimeout: 15000,
                        removeContainer: false
                    });

                    if (canvasLooksBlank(canvas)) {
                        throw new Error(`第 ${i + 1} 张导出为空白，请检查图片资源或导出样式`);
                    }

                    canvas.toBlob((blob) => {
                        if (blob) {
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = `${document.title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_')}_${String(i + 1).padStart(2, '0')}.png`;
                            a.click();
                            URL.revokeObjectURL(url);
                        }
                    }, 'image/png');
                    showToast(`正在生成: ${i + 1}/${totalSlices}`);
                    await new Promise(resolve => setTimeout(resolve, 200));
                }

                document.body.removeChild(renderContainer);
                showToast(`完成，已下载 ${totalSlices} 张图片`, 3000);
            } catch (error) {
                console.error('Export failed:', error);
                showToast(`导出失败: ${error.message}`, 3000);
            } finally {
                exportBtn.disabled = false;
            }
        }

        function downloadHtml() {
            const html = document.documentElement.outerHTML;
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.title.replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_')}.html`;
            a.click();
            URL.revokeObjectURL(url);
        }

        ratioBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                ratioBtns.forEach(item => item.classList.remove('active'));
                btn.classList.add('active');
                currentRatio = btn.dataset.ratio;
                updateStats();
            });
        });

        exportBtn.addEventListener('click', exportSlices);
        downloadHtmlBtn.addEventListener('click', downloadHtml);

        document.fonts.ready.then(() => {
            updateStats();
        });

        const observer = new MutationObserver(updateStats);
        observer.observe(contentArea, { childList: true, subtree: true });
    </script>
</body>
</html>
